# Hostname and token are read from Grafana's process environment at startup.
# With Docker Compose, copy `.env.example` to `.env` next to `docker-compose.yaml`, or export the variables before `docker compose up`.
# See also: https://grafana.com/docs/grafana/latest/administration/provisioning/#use-environment-variables-in-provisioning-files
apiVersion: 1

datasources:
  - name: 'Litmus Edge'
    type: 'litmus-edge-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    jsonData:
      hostname: ${LITMUS_EDGE_HOSTNAME}
    secureJsonData:
      token: ${LITMUS_EDGE_TOKEN}
