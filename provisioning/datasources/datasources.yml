# Dev provisioning — same env vars as the litmus-grafana image.
# Copy `.env.example` to `.env` and set EDGE_EXTERNAL=true with a Litmus
# Edge address + token for local development against an external Litmus Edge.
# See also: https://grafana.com/docs/grafana/latest/administration/provisioning/#use-environment-variables-in-provisioning-files
apiVersion: 1

datasources:
  - name: 'Litmus Edge'
    type: 'litmus-edge-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 3
    editable: true
    jsonData:
      externalEdge: ${EDGE_EXTERNAL}
      gatewayIp: ${EDGE_DOCKER_GATEWAY_IP}
      hostname: ${EDGE_HOSTNAME}
      natsProxyPort: ${EDGE_NATS_PROXY_PORT}
    secureJsonData:
      token: ${EDGE_ACCESS_ACCOUNT_API_KEY}
      apiToken: ${EDGE_API_TOKEN}
