# Dev provisioning — same env vars as the litmus-grafana image.
# Copy `.env.example` to `.env` and set LITMUS_EDGE_EXTERNAL=true with
# hostname + token for local development against an external Litmus Edge.
# See also: https://grafana.com/docs/grafana/latest/administration/provisioning/#use-environment-variables-in-provisioning-files
apiVersion: 1

datasources:
  - name: 'Litmus Edge'
    type: 'litmus-edge-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 3
    editable: true
    jsonData:
      externalEdge: ${LITMUS_EDGE_EXTERNAL}
      hostname: ${LITMUS_EDGE_HOSTNAME}
    secureJsonData:
      token: ${LITMUS_EDGE_ACCESS_ACCOUNT_TOKEN}
      apiToken: ${LITMUS_EDGE_API_TOKEN}
