services:
  grafana:
    user: root
    container_name: 'litmus-edge-datasource'

    build:
      context: .
      args:
        grafana_image: ${GRAFANA_IMAGE:-grafana-enterprise}
        grafana_version: ${GRAFANA_VERSION:-12.2.0}
        development: ${DEVELOPMENT:-false}
        anonymous_auth_enabled: ${ANONYMOUS_AUTH_ENABLED:-true}
    ports:
      - 3000:3000/tcp
      - 2345:2345/tcp # delve
    security_opt:
      - 'apparmor:unconfined'
      - 'seccomp:unconfined'
    cap_add:
      - SYS_PTRACE
    volumes:
      - ../dist:/var/lib/grafana/plugins/litmus-edge-datasource
      - ../provisioning:/etc/grafana/provisioning
      - ..:/root/litmus-edge-datasource

    environment:
      # Passed into provisioning YAML (${LITMUS_EDGE_HOSTNAME} / ${LITMUS_EDGE_TOKEN})
      LITMUS_EDGE_HOSTNAME: ${LITMUS_EDGE_HOSTNAME:-}
      LITMUS_EDGE_TOKEN: ${LITMUS_EDGE_TOKEN:-}
      NODE_ENV: development
      GF_LOG_FILTERS: plugin.litmus-edge-datasource:debug
      GF_LOG_LEVEL: debug
      GF_DATAPROXY_LOGGING: 1
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: litmus-edge-datasource
