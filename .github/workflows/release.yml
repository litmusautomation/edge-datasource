name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      grafana_version:
        description: 'Grafana base image version (empty = Dockerfile default)'
        required: false
        default: ''

env:
  REGISTRY: us-docker.pkg.dev/litmus-customer-facing/litmus-solutions
  IMAGE_NAME: litmus-grafana
  ROOT_URLS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:8080,http://localhost:8443

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install mage
        run: go install github.com/magefile/mage@latest

      - name: Build frontend
        run: npm ci && npm run build

      - name: Build backend
        run: mage build:linux && chmod 0755 dist/gpx_edge_linux_amd64

      - name: Sign plugin
        env:
          GRAFANA_ACCESS_POLICY_TOKEN: ${{ secrets.GRAFANA_ACCESS_POLICY_TOKEN }}
        run: npx --yes @grafana/sign-plugin@latest --rootUrls "$ROOT_URLS"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Package plugin
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p litmus-edge-datasource
          cp -r dist/* litmus-edge-datasource/
          zip -r "litmus-edge-datasource-${VERSION}.zip" litmus-edge-datasource/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: litmus-edge-datasource-*.zip
          generate_release_notes: true

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Login to Artifact Registry
        env:
          DOCKER_AUTH: ${{ secrets.DOCKER_AUTH_CONFIG }}
        run: |
          mkdir -p "$HOME/.docker"
          echo "$DOCKER_AUTH" > "$HOME/.docker/config.json"

      - name: Determine image tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "IMAGE_TAG=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=$(jq -r .version package.json)-$(date +%Y%m%d%H%M%S)" >> "$GITHUB_ENV"
          fi

      - name: Build and push
        env:
          GRAFANA_VERSION: ${{ inputs.grafana_version }}
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          BUILD_ARGS=""
          if [ -n "$GRAFANA_VERSION" ]; then
            BUILD_ARGS="--build-arg GRAFANA_VERSION=$GRAFANA_VERSION"
          fi

          TAGS="-t ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          if [ "$IS_TAG" = "true" ]; then
            TAGS="$TAGS -t ${REGISTRY}/${IMAGE_NAME}:latest"
          fi

          docker build $BUILD_ARGS \
            --platform linux/amd64 \
            -f litmus-grafana/Dockerfile \
            $TAGS \
            .

          docker push "${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"
          if [ "$IS_TAG" = "true" ]; then
            docker push "${REGISTRY}/${IMAGE_NAME}:latest"
          fi
